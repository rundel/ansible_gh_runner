---
- hosts: sta199
  become: yes
  vars_prompt:
    - name: course
      prompt: Enter the course name
      private: no
    - name: runner_token
      prompt: Enter the GH runner token
      private: yes
    - name: org_url
      prompt: Enter the url for your GH organization
      private: no
    - name: runner_n
      prompt: Enter the number of runners
      default: "4"
      private: no
  vars:
    runner_file: "actions-runner-linux-x64-{{ runner_version }}.tar.gz"
    runner_url: "https://github.com/actions/runner/releases/download/v{{ runner_version }}/{{ runner_file }}"
    runner_path: /tmp/
    runner_base_dir: "~"
  tasks:
    - name: Fetch latest runner release from GitHub
      uri:
        url: https://api.github.com/repos/actions/runner/releases/latest
        return_content: yes
      register: latest_release
      delegate_to: localhost
      become: false
      when: runner_version is not defined

    - name: Resolve runner_version to latest release
      set_fact:
        runner_version: "{{ latest_release.json.tag_name | regex_replace('^v', '') }}"
      when: runner_version is not defined

    - name: Show runner version in use
      debug:
        msg: "Using GitHub Actions runner v{{ runner_version }}"

    - name: Run whoami without become.
      command: whoami
      changed_when: false
      become: false
      register: whoami

    - name: Check if docker is installed
      command: which docker
      register: docker_check
      changed_when: false
      failed_when: false

    - name: Install Docker (Debian)
      when: docker_check.rc != 0 and ansible_facts['os_family'] == "Debian"
      block:
        - name: Install Docker prerequisites
          apt:
            name:
              - ca-certificates
              - curl
              - gnupg
            state: present
            update_cache: true

        - name: Create Docker keyring directory
          file:
            path: /etc/apt/keyrings
            state: directory
            mode: '0755'

        - name: Download Docker GPG key
          get_url:
            url: "https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg"
            dest: /etc/apt/keyrings/docker.asc
            mode: '0644'

        - name: Add Docker apt repository
          apt_repository:
            repo: "deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/{{ ansible_distribution | lower }} {{ ansible_distribution_release }} stable"
            state: present
            filename: docker

        - name: Install Docker packages
          apt:
            name:
              - docker-ce
              - docker-ce-cli
              - containerd.io
              - docker-buildx-plugin
              - docker-compose-plugin
            state: present
            update_cache: true

    - name: Install Docker (RedHat)
      when: docker_check.rc != 0 and ansible_facts['os_family'] == "RedHat"
      block:
        - name: Install dnf-plugins-core
          dnf:
            name: dnf-plugins-core
            state: present

        - name: Add Docker repository
          command: dnf config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo
          args:
            creates: /etc/yum.repos.d/docker-ce.repo

        - name: Install Docker packages
          dnf:
            name:
              - docker-ce
              - docker-ce-cli
              - containerd.io
              - docker-buildx-plugin
              - docker-compose-plugin
            state: present

    - name: Start docker service
      service:
        name: docker
        state: started

    - name: Add user to docker group
      ansible.builtin.user:
        name: "{{ whoami.stdout }}"
        group: "{{ whoami.stdout }}"
        groups: docker
        append: yes

    - name: Download local runner tar.gz
      get_url:
        url: "{{ runner_url }}"
        dest: "{{ runner_path }}/{{ runner_file }}"
      become: false

    - name: Create runner base dir
      file:
        path: "{{ runner_base_dir }}"
        state: directory
        mode: '0777'
      become: true

    - name: Create folders
      file:
        path: "{{ runner_base_dir }}/{{ course }}/runner{{ item }}"
        state: directory
      loop: "{{ range(0, runner_n | int, 1) | list }}"
      become: false

    - name: Extract runner
      ansible.builtin.unarchive:
        src: "{{ runner_path }}/{{ runner_file }}"
        dest: "{{ runner_base_dir }}/{{ course }}/runner{{ item }}/"
        remote_src: true
        creates: "{{ runner_base_dir }}/{{ course }}/runner{{ item }}/run.sh"
      loop: "{{ range(0, runner_n | int, 1) | list }}"
      become: false

    - name: Configure runners
      shell: "./config.sh --unattended --url {{ org_url }} --token {{ runner_token }} --name `hostname -s`-runner{{ item }}"
      args:
        chdir: "{{ runner_base_dir }}/{{ course }}/runner{{ item }}/"
        creates: "{{ runner_base_dir }}/{{ course }}/runner{{ item }}/.runner"
      loop: "{{ range(0, runner_n | int, 1) | list }}"
      become: false

    - name: Install runner services
      command: "./svc.sh install"
      become: true
      args:
        chdir: "{{ runner_base_dir | regex_replace('^~$', '~' + whoami.stdout) }}/{{ course }}/runner{{ item }}/"
      loop: "{{ range(0, runner_n | int, 1) | list }}"

    - name: Start runner services
      command: "./svc.sh start"
      become: true
      args:
        chdir: "{{ runner_base_dir | regex_replace('^~$', '~' + whoami.stdout) }}/{{ course }}/runner{{ item }}/"
      loop: "{{ range(0, runner_n | int, 1) | list }}"
